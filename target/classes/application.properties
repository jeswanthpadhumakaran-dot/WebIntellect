# Server configuration
server.port=8080

# Logging level
logging.level.root=INFO
logging.level.com.webintellect=DEBUG

# RestTemplate connection timeouts (for AI API calls)
spring.http.client.connect-timeout=10000
spring.http.client.read-timeout=60000

# LLM API configuration (defaulting to Gemini as it represents a robust default without extra config SDKs)
# Replace this with a valid API key to enable AI functionality
ai.gemini.api.key=YOUR_GEMINI_API_KEY
ai.gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent
